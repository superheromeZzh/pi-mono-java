apiVersion: v1
kind: PersistentVolume
metadata:
  name: campusclaw-code-pv
  labels:
    app.kubernetes.io/name: campusclaw
    app.kubernetes.io/component: storage
spec:
  capacity:
    storage: 10Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: hostpath
  hostPath:
    path: /Users/simon/01.code/pi-mono-java
    type: Directory
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: campusclaw-code-pvc
  namespace: campusclaw
  labels:
    app.kubernetes.io/name: campusclaw
    app.kubernetes.io/component: storage
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: hostpath
  resources:
    requests:
      storage: 10Gi
  volumeName: campusclaw-code-pv
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: campusclaw-data-pv
  labels:
    app.kubernetes.io/name: campusclaw
    app.kubernetes.io/component: storage
spec:
  capacity:
    storage: 5Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: hostpath
  hostPath:
    path: /Users/simon/.campusclaw
    type: DirectoryOrCreate
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: campusclaw-data-pvc
  namespace: campusclaw
  labels:
    app.kubernetes.io/name: campusclaw
    app.kubernetes.io/component: storage
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: hostpath
  resources:
    requests:
      storage: 5Gi
  volumeName: campusclaw-data-pv

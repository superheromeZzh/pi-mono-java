apiVersion: v1
kind: Service
metadata:
  name: campusclaw
  namespace: campusclaw
  labels:
    app.kubernetes.io/name: campusclaw
    app.kubernetes.io/component: service
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: campusclaw
---
# 用于本地访问的 NodePort 服务
apiVersion: v1
kind: Service
metadata:
  name: campusclaw-nodeport
  namespace: campusclaw
  labels:
    app.kubernetes.io/name: campusclaw
    app.kubernetes.io/component: service
spec:
  type: NodePort
  ports:
    - port: 8080
      targetPort: http
      nodePort: 30080
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: campusclaw

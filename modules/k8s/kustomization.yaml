apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: campusclaw

metadata:
  name: campusclaw
  annotations:
    config.kubernetes.io/local-config: "true"

resources:
  - namespace.yaml
  - persistent-volume.yaml
  - configmap.yaml
  - deployment.yaml
  - service.yaml

commonLabels:
  app.kubernetes.io/name: campusclaw
  app.kubernetes.io/managed-by: kustomize

images:
  - name: eclipse-temurin
    newTag: 21-jdk-alpine
  - name: docker
    newTag: 27-dind

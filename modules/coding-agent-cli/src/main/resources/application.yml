spring:
  main:
    banner-mode: off
    lazy-initialization: true
    web-application-type: none
  lazy-initialization:
    exclude: webSocketGatewayConfig,gatewayChannel
  application:
    name: campusclaw-agent
  datasource:
    url: ${GAUSSDB_URL:jdbc:postgresql://localhost:5432/pi_assistant}
    username: ${GAUSSDB_USER:root}
    password: ${GAUSSDB_PASSWORD:root}
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: never

mybatis:
  configuration:
    map-underscore-to-camel-case: true

pi:
  assistant:
    gateway:
      enabled: false
      token:

# 服务器模式（--mode server）下 /api/ws/chat 与 /api/chat 的会话持久化
# 开启后会把每个 conversation_id 的消息历史写入
# ~/.campusclaw/agent/sessions/--<encoded-cwd>--/<id>.jsonl
# 重连或进程重启后用同一个 conversation_id 可恢复历史
server:
  session:
    persistence:
      enabled: true

logging:
  level:
    root: WARN
    com.campusclaw: WARN
    io.netty: ERROR
    # Banner logger 独立级别，让 `pi --mode server` 启动 endpoint 列表无论 root/包级
    # 怎么调都能打出来——这是面向操作者的启动反馈，不该被生产噪音过滤策略误伤。
    CampusClawStartupBanner: INFO

# 工具执行配置 - 沙箱模式
tool:
  execution:
    # 默认执行模式: LOCAL | SANDBOX | AUTO
    # SANDBOX = 强制所有工具在沙箱中执行
    # AUTO = 根据风险评估自动选择
    # LOCAL = 强制本地执行
    default-mode: LOCAL

    # 启用混合路由
    # 注意：启用混合工具会替换原工具，两者不能同时存在
    # 默认 false：直接使用本地工具；改为 true 会启用 hybrid 路由并要求 Docker 可用
    hybrid-enabled: false

    # 允许本地执行
    local-execution-enabled: true

    # 允许沙箱执行（需要 Docker）
    sandbox-execution-enabled: true

    # Docker 守护进程地址（本地开发使用本地 Docker）
    docker-host: unix:///var/run/docker.sock

    # 沙箱工作目录
    sandbox-workspace-path: /workspace

    # 沙箱工作镜像
    sandbox-worker-image: alpine:3.19

    # 沙箱资源限制
    sandbox-worker-memory: 512m
    sandbox-worker-cpu: 1.0

    # 超时配置
    sandbox-timeout-seconds: 120
    local-timeout-seconds: 60

    # 使用临时容器模式（不需要常驻 worker 容器）
    # 适用于无法拉取镜像的场景，每次执行创建新容器
    use-ephemeral-containers: false

# 子 agent 后端配置 (spawn_agent 工具)
# 主 agent 通过 spawn_agent 工具调用其它 coding agent；下方每个 entry 是一种后端。
# type=acp: 走 ACP 协议 + stdio (Claude Code, Codex/Gemini 等)
# type=http: 走自有 HTTP/ndJSON 协议 (URL + 鉴权)
# disabled=true 可临时关闭某条而不删整段
subagent:
  enabled: true
  backends:
    claude-code:
      type: acp
      disabled: false
      command: claude
      args:
        - "--acp"
      prompt-timeout: PT15M
      client-name: campusclaw-acp
      client-version: 1.0.0
    codex:
      type: acp
      disabled: true
      command: codex-acp
      args: []
      prompt-timeout: PT15M
    # 远端 HTTP agent 示例（默认禁用；启用时设置 url + auth-token）
    remote-http:
      type: http
      disabled: true
      url: https://agent.example.com/api
      auth-type: bearer    # bearer | header | none
      auth-token: ${CAMPUSCLAW_REMOTE_AGENT_TOKEN:}
      connect-timeout: PT10S
      request-timeout: PT30S
      prompt-timeout: PT10M

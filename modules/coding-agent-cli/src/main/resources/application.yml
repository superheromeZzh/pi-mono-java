spring:
  main:
    banner-mode: off
    lazy-initialization: true
    web-application-type: none
  application:
    name: campusclaw-agent
  datasource:
    url: jdbc:h2:file:./data/pi_assistant;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

mybatis:
  configuration:
    map-underscore-to-camel-case: true

org:
  jobrunr:
    background-job-server:
      enabled: true
    dashboard:
      enabled: false

logging:
  level:
    root: WARN
    com.campusclaw: WARN
    org.springframework: WARN
    io.netty: ERROR

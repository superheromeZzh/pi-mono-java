spring:
  main:
    banner-mode: off
    lazy-initialization: true
    web-application-type: none
  lazy-initialization:
    exclude: webSocketGatewayConfig,gatewayChannel
  application:
    name: campusclaw-agent
  datasource:
    url: ${GAUSSDB_URL:jdbc:postgresql://localhost:5432/pi_assistant}
    username: ${GAUSSDB_USER:root}
    password: ${GAUSSDB_PASSWORD:root}
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: never

mybatis:
  configuration:
    map-underscore-to-camel-case: true

pi:
  assistant:
    gateway:
      enabled: false
      token:

logging:
  level:
    root: WARN
    com.campusclaw: WARN
    io.netty: ERROR

asyncapi: 3.0.0

info:
  title: CampusClaw Chat WebSocket API
  version: 1.0.0
  description: |
    Bidirectional interactive chat channel over WebSocket.
    Complements `POST /api/chat` (SSE) by adding support for:
      - mid-run steering (`steer`)
      - interactive abort without tearing the connection
      - in-session model / thinking-level switching
      - session resume via `conversation_id` handshake parameter

    Every frame is a JSON object with a required `type` discriminator.
    Client-to-server commands may include an `id` that will be echoed in a
    matching `response` frame.

  contact:
    name: CampusClaw
    url: https://github.com/mariozechner/pi-mono-java
  license:
    name: MIT

defaultContentType: application/json

servers:
  local:
    host: localhost:3000
    protocol: ws
    pathname: /api/ws/chat
    description: Local developer instance started via `campusclaw --mode server --port 3000`.
  production:
    host: api.example.com
    protocol: wss
    pathname: /api/ws/chat
    description: Production endpoint. Requires bearer token on handshake.
    security:
      - $ref: '#/components/securitySchemes/bearerToken'

channels:
  chat:
    address: /api/ws/chat
    title: Chat channel
    description: |
      Single WebSocket channel carrying commands (client → server) and events
      (server → client). Handshake accepts two optional query parameters:
        - `conversation_id` — resume an existing conversation; omit to create one
        - `token`           — bearer token for production (see securitySchemes)

      Close codes:
        - 1000  normal close
        - 4400  protocol error (bad frame / validation failure)
        - 4401  unauthenticated or token expired
        - 4409  conversation busy (client tried to start a second `prompt` while streaming)
    parameters:
      conversation_id:
        description: Optional existing conversation ID to resume. Passed as query parameter on the handshake URL.
    messages:
      # Client → Server commands
      Prompt: { $ref: '#/components/messages/Prompt' }
      Steer: { $ref: '#/components/messages/Steer' }
      Abort: { $ref: '#/components/messages/Abort' }
      NewSession: { $ref: '#/components/messages/NewSession' }
      SetModel: { $ref: '#/components/messages/SetModel' }
      SetThinkingLevel: { $ref: '#/components/messages/SetThinkingLevel' }
      GetState: { $ref: '#/components/messages/GetState' }
      GetHistory: { $ref: '#/components/messages/GetHistory' }
      GetPromptTemplates: { $ref: '#/components/messages/GetPromptTemplates' }
      ListSkills: { $ref: '#/components/messages/ListSkills' }
      Ping: { $ref: '#/components/messages/Ping' }
      # Server → Client frames
      Response: { $ref: '#/components/messages/Response' }
      AgentStart: { $ref: '#/components/messages/AgentStart' }
      MessageStart: { $ref: '#/components/messages/MessageStart' }
      MessageUpdate: { $ref: '#/components/messages/MessageUpdate' }
      MessageEnd: { $ref: '#/components/messages/MessageEnd' }
      ToolStart: { $ref: '#/components/messages/ToolStart' }
      ToolUpdate: { $ref: '#/components/messages/ToolUpdate' }
      ToolEnd: { $ref: '#/components/messages/ToolEnd' }
      Done: { $ref: '#/components/messages/Done' }
      ErrorEvent: { $ref: '#/components/messages/ErrorEvent' }
      Pong: { $ref: '#/components/messages/Pong' }

operations:
  sendCommand:
    action: send
    channel: { $ref: '#/channels/chat' }
    summary: Client sends a command to the agent.
    messages:
      - $ref: '#/channels/chat/messages/Prompt'
      - $ref: '#/channels/chat/messages/Steer'
      - $ref: '#/channels/chat/messages/Abort'
      - $ref: '#/channels/chat/messages/NewSession'
      - $ref: '#/channels/chat/messages/SetModel'
      - $ref: '#/channels/chat/messages/SetThinkingLevel'
      - $ref: '#/channels/chat/messages/GetState'
      - $ref: '#/channels/chat/messages/GetHistory'
      - $ref: '#/channels/chat/messages/GetPromptTemplates'
      - $ref: '#/channels/chat/messages/ListSkills'
      - $ref: '#/channels/chat/messages/Ping'

  receiveEvent:
    action: receive
    channel: { $ref: '#/channels/chat' }
    summary: Server pushes agent events or a synchronous response to the client.
    messages:
      - $ref: '#/channels/chat/messages/Response'
      - $ref: '#/channels/chat/messages/AgentStart'
      - $ref: '#/channels/chat/messages/MessageStart'
      - $ref: '#/channels/chat/messages/MessageUpdate'
      - $ref: '#/channels/chat/messages/MessageEnd'
      - $ref: '#/channels/chat/messages/ToolStart'
      - $ref: '#/channels/chat/messages/ToolUpdate'
      - $ref: '#/channels/chat/messages/ToolEnd'
      - $ref: '#/channels/chat/messages/Done'
      - $ref: '#/channels/chat/messages/ErrorEvent'
      - $ref: '#/channels/chat/messages/Pong'

components:

  securitySchemes:
    bearerToken:
      type: httpApiKey
      in: query
      name: token
      description: Bearer token passed as the `token` query parameter on the WebSocket handshake URL.

  messages:

    # =========================================================================
    # Client → Server commands
    # =========================================================================

    Prompt:
      name: Prompt
      title: Send user message
      summary: Start a new assistant turn. Rejected with close code 4409 (or response error) if the conversation is already streaming.
      payload: { $ref: '#/components/schemas/PromptCmd' }
      examples:
        - payload: { type: prompt, id: req-1, message: "用 Java 写一个快速排序" }

    Steer:
      name: Steer
      title: Steer the running agent
      summary: Inject an additional user message while the agent is mid-run. Does not start a new turn.
      payload: { $ref: '#/components/schemas/SteerCmd' }
      examples:
        - payload: { type: steer, id: req-2, message: "改用 Python 实现" }

    Abort:
      name: Abort
      title: Abort current generation
      summary: Stop the currently running turn. Safe to call when idle (no-op).
      payload: { $ref: '#/components/schemas/AbortCmd' }
      examples:
        - payload: { type: abort, id: req-3 }

    NewSession:
      name: NewSession
      title: Reset conversation history
      summary: Clear all messages while keeping model / system prompt / tools.
      payload: { $ref: '#/components/schemas/NewSessionCmd' }
      examples:
        - payload: { type: new_session, id: req-4 }

    SetModel:
      name: SetModel
      title: Switch model
      summary: Change the model used by this conversation. Accepts exact model ID, provider/id, or fuzzy substring.
      payload: { $ref: '#/components/schemas/SetModelCmd' }
      examples:
        - payload: { type: set_model, id: req-5, model: "claude-sonnet-4" }

    SetThinkingLevel:
      name: SetThinkingLevel
      title: Change thinking level
      payload: { $ref: '#/components/schemas/SetThinkingLevelCmd' }
      examples:
        - payload: { type: set_thinking_level, id: req-6, level: high }

    GetState:
      name: GetState
      title: Query session state
      summary: Returns streaming flag, current model, thinking level, and message count.
      payload: { $ref: '#/components/schemas/GetStateCmd' }
      examples:
        - payload: { type: get_state, id: req-7 }

    GetHistory:
      name: GetHistory
      title: Return full message history
      payload: { $ref: '#/components/schemas/GetHistoryCmd' }
      examples:
        - payload: { type: get_history, id: req-8 }

    GetPromptTemplates:
      name: GetPromptTemplates
      title: List installed prompt templates
      payload: { $ref: '#/components/schemas/GetPromptTemplatesCmd' }

    ListSkills:
      name: ListSkills
      title: List installed skills
      payload: { $ref: '#/components/schemas/ListSkillsCmd' }

    Ping:
      name: Ping
      title: Application-level heartbeat
      summary: Server replies with a `pong` frame. The server also emits `pong` autonomously every 20s.
      payload: { $ref: '#/components/schemas/PingCmd' }

    # =========================================================================
    # Server → Client frames
    # =========================================================================

    Response:
      name: Response
      title: Synchronous response to a command with an id
      payload: { $ref: '#/components/schemas/ResponseFrame' }
      examples:
        - payload: { type: response, id: req-1, success: true, data: { conversation_id: a1b2c3d4 } }
        - payload: { type: response, id: req-5, success: false, error: "Unknown model: foobar" }

    AgentStart:
      name: AgentStart
      title: Agent run started
      summary: Emitted once at the start of a turn, after a `prompt` or `steer` is accepted.
      payload: { $ref: '#/components/schemas/AgentStartEvt' }

    MessageStart:
      name: MessageStart
      title: Assistant message streaming started
      payload: { $ref: '#/components/schemas/MessageStartEvt' }

    MessageUpdate:
      name: MessageUpdate
      title: Assistant message incremental update
      summary: Carries the in-progress Message object. Frontends should diff against the previous update rather than assume pure deltas.
      payload: { $ref: '#/components/schemas/MessageUpdateEvt' }

    MessageEnd:
      name: MessageEnd
      title: Assistant message finalized
      payload: { $ref: '#/components/schemas/MessageEndEvt' }

    ToolStart:
      name: ToolStart
      title: Tool execution started
      payload: { $ref: '#/components/schemas/ToolStartEvt' }

    ToolUpdate:
      name: ToolUpdate
      title: Tool execution partial result
      payload: { $ref: '#/components/schemas/ToolUpdateEvt' }

    ToolEnd:
      name: ToolEnd
      title: Tool execution finished
      payload: { $ref: '#/components/schemas/ToolEndEvt' }

    Done:
      name: Done
      title: Agent turn completed
      summary: |
        Emitted when the agent finishes a turn (successfully or via abort).
        Includes the final assistant text, usage, and stopReason extracted from
        the last `AssistantMessage` in the turn's message history, so frontends
        don't have to track assistant bubbles themselves.
      payload: { $ref: '#/components/schemas/DoneEvt' }

    ErrorEvent:
      name: ErrorEvent
      title: Runtime or model-level error
      summary: |
        Emitted in two cases:
          1. The `session.prompt(...)` future completes exceptionally (Java exception, transport error).
          2. The final `AssistantMessage` has `stopReason=error` — model returned a provider-level failure.
        In case 2, this `error` frame is emitted **in addition to** `message_end` and `done`,
        so frontends can treat this frame as the single source of truth for "something went wrong
        with this turn". The connection stays open; clients may retry.
      payload: { $ref: '#/components/schemas/ErrorEvt' }

    Pong:
      name: Pong
      title: Heartbeat
      payload: { $ref: '#/components/schemas/PongFrame' }

  schemas:

    # -------------------------------------------------------------------------
    # Command schemas
    # -------------------------------------------------------------------------

    PromptCmd:
      type: object
      required: [type, message]
      properties:
        type: { const: prompt }
        id:
          type: string
          description: Client-assigned correlation id. Echoed back in a `response` frame.
        message:
          type: string
          minLength: 1
          description: Raw user input. Leading `/name args` is expanded as a prompt template before hitting the agent.

    SteerCmd:
      type: object
      required: [type, message]
      properties:
        type: { const: steer }
        id: { type: string }
        message: { type: string, minLength: 1 }

    AbortCmd:
      type: object
      required: [type]
      properties:
        type: { const: abort }
        id: { type: string }

    NewSessionCmd:
      type: object
      required: [type]
      properties:
        type: { const: new_session }
        id: { type: string }

    SetModelCmd:
      type: object
      required: [type, model]
      properties:
        type: { const: set_model }
        id: { type: string }
        model:
          type: string
          description: Model identifier. Accepts exact id (`glm-5`), provider-qualified (`zai/glm-5`), or fuzzy substring (`sonnet`).

    SetThinkingLevelCmd:
      type: object
      required: [type, level]
      properties:
        type: { const: set_thinking_level }
        id: { type: string }
        level:
          type: string
          enum: [off, minimal, low, medium, high, xhigh]

    GetStateCmd:
      type: object
      required: [type]
      properties:
        type: { const: get_state }
        id: { type: string }

    GetHistoryCmd:
      type: object
      required: [type]
      properties:
        type: { const: get_history }
        id: { type: string }

    GetPromptTemplatesCmd:
      type: object
      required: [type]
      properties:
        type: { const: get_prompt_templates }
        id: { type: string }

    ListSkillsCmd:
      type: object
      required: [type]
      properties:
        type: { const: list_skills }
        id: { type: string }

    PingCmd:
      type: object
      required: [type]
      properties:
        type: { const: ping }

    # -------------------------------------------------------------------------
    # Server frame schemas
    # -------------------------------------------------------------------------

    ResponseFrame:
      type: object
      required: [type, success]
      properties:
        type: { const: response }
        id:
          type: string
          description: Echoes the `id` from the originating command. Absent if the command omitted one.
        success: { type: boolean }
        data:
          description: Command-specific payload when `success` is true. Shape depends on the command; see individual command docs.
        error:
          type: string
          description: Human-readable error message when `success` is false.

    AgentStartEvt:
      type: object
      required: [type]
      properties:
        type: { const: agent_start }
        conversation_id: { type: string }

    MessageStartEvt:
      type: object
      required: [type]
      properties:
        type: { const: message_start }
        conversation_id: { type: string }
        message:
          $ref: '#/components/schemas/Message'
          description: The Message being started (role, empty content so far).

    MessageUpdateEvt:
      type: object
      required: [type]
      properties:
        type: { const: message_update }
        message: { $ref: '#/components/schemas/Message' }

    MessageEndEvt:
      type: object
      required: [type]
      properties:
        type: { const: message_end }
        message: { $ref: '#/components/schemas/Message' }

    ToolStartEvt:
      type: object
      required: [type, toolCallId, toolName]
      properties:
        type: { const: tool_start }
        toolCallId: { type: string }
        toolName: { type: string }
        args:
          description: Tool input arguments (tool-specific JSON).

    ToolUpdateEvt:
      type: object
      required: [type, toolCallId, toolName]
      properties:
        type: { const: tool_update }
        toolCallId: { type: string }
        toolName: { type: string }
        args: {}
        partialResult:
          description: In-progress tool output (tool-specific JSON).

    ToolEndEvt:
      type: object
      required: [type, toolCallId, toolName, isError]
      properties:
        type: { const: tool_end }
        toolCallId: { type: string }
        toolName: { type: string }
        isError: { type: boolean }
        result:
          description: Tool result (may be truncated by the server for large outputs).

    DoneEvt:
      type: object
      required: [type]
      properties:
        type: { const: done }
        conversation_id: { type: string }
        finalText:
          type: string
          description: |
            Concatenation of every `text` content block from the last assistant
            message in this turn. Present when the final assistant message had
            at least one text block. Frontends can treat this as "the answer".
        usage:
          type: object
          additionalProperties: true
          description: |
            Token usage and cost for the last assistant message. Mirrors
            `com.campusclaw.ai.types.Usage` (inputTokens / outputTokens / cost etc.).
            Shape is passed through from the provider, so frontends should
            tolerate extra keys.
        stopReason:
          type: string
          enum: [stop, length, toolUse, error, aborted]
          description: |
            Why the last assistant message stopped generating. `error` /
            `aborted` are terminal conditions you may want to surface in UI.
            When `error`, an additional `error` frame is emitted alongside this
            `done` frame.

    ErrorEvt:
      type: object
      required: [type, error]
      properties:
        type: { const: error }
        error: { type: string }
        conversation_id: { type: string }

    PongFrame:
      type: object
      required: [type]
      properties:
        type: { const: pong }

    # -------------------------------------------------------------------------
    # Shared: Message (minimal; authoritative shape is com.campusclaw.ai.types.Message)
    # -------------------------------------------------------------------------

    Message:
      type: object
      description: |
        Opaque Message object from `com.campusclaw.ai.types.Message`. Fields vary by role
        (user, assistant, tool-result, etc). Frontends should tolerate unknown fields.
      additionalProperties: true

openapi: 3.0.3

info:
  title: CampusClaw HTTP API
  version: 1.0.0
  description: |
    `campusclaw --mode server` 模式下暴露的 REST + SSE + WebSocket 接口。

    CampusClaw 的 HTTP Server 模式对外提供一组 REST 端点，用于流式对话、会话
    管理、技能（skill）包管理以及 settings 写入。

    **本文件覆盖范围**（仅 HTTP：REST + SSE）：

    | 类别 | 路径 |
    |---|---|
    | health | `GET /api/health` |
    | chat（SSE 流式对话） | `POST /api/chat` |
    | conversations | `GET /api/conversations`、`DELETE /api/conversations/{id}` |
    | skills | `GET\|POST /api/skills`、`DELETE /api/skills/{name}`、`POST /api/skills/{name}/{enable\|disable}` |
    | settings | `GET /api/settings/models`、`PUT /api/settings/models/default`、`PUT /api/settings/customModels` |

    **WebSocket 通道 `/api/ws/chat` 不在本文件**：它是消息 / 事件驱动的双向
    通道，用 **AsyncAPI 3.0** 描述在 `docs/asyncapi/chat-ws.yaml` 中——OpenAPI
    没有 WebSocket 语义，不强行塞进来。功能上 `POST /api/chat` 是
    "fire-and-forget" 的 SSE，缺少 steer / abort / 模型切换等交互能力；需要
    完整能力的客户端应走 WebSocket，并参考那份 AsyncAPI 契约。

    **CORS**：所有 `/api/**` 路径都接受 `OPTIONS` 预检请求，服务端返回 204
    并附 `Access-Control-Allow-Origin: *`、允许的方法 / 头部、`Max-Age: 3600`。
    本文件不再为每个端点单独罗列 OPTIONS。

    **实现说明**：服务端是一个 Reactor Netty 实例，通过
    `modules/coding-agent-cli/.../ServerMode.java` 中的 `RouterFunctions`
    注册路由。**不是** 基于 `@RestController` 的 Spring MVC 应用，所以 URL
    路径才是权威契约，而不是某个 controller 类。
  contact:
    name: CampusClaw
    url: https://github.com/mariozechner/pi-mono-java
  license:
    name: MIT

servers:
  - url: http://localhost:3000
    description: 默认本地服务（端口可通过 `--port` 调整）
  - url: http://{host}:{port}
    description: 自定义 host / port
    variables:
      host:
        default: localhost
      port:
        default: "3000"

tags:
  - name: health
    description: 进程存活探针。无认证、无副作用，运维 / load balancer 用来判断进程是否在跑。
  - name: chat
    description: |
      Server-Sent Events 流式对话。一次 HTTP 请求 = 一次 agent turn，事件以
      `event: <type>\ndata: <json>\n\n` 的形式推流，无上行通道。

      支持的事件类型（`event:` 字段）：
      `message_start`、`message_update`、`message_end`、`tool_start`、
      `tool_end`、`done`、`error`。每个事件的 `data:` 行是一段 JSON，
      具体 schema 见 `POST /api/chat` 的 200 响应描述。

      **与 WebSocket 通道的关系**：SSE 是单向的，不支持 steer、abort 或
      连接中切换模型。需要这些能力时改用 `/api/ws/chat`（见
      `docs/asyncapi/chat-ws.yaml`）。两者底层共用 `SessionPool`，相同
      `conversation_id` 在两个端点之间互通。
  - name: conversations
    description: |
      浏览服务端持久化的会话历史。每条会话对应
      `~/.campusclaw/agent/sessions/--<encoded-cwd>--/<id>.jsonl` 中的一个
      JSONL 文件。**该列表是按服务进程的工作目录划分的** —— 不同
      `user.dir` 下启动的 server 看到的列表彼此独立。

      列表本身不要求建立 WS 连接，所以前端可以"打开页面就看到所有历史会话
      并选择打开"，再用对应的 `conversation_id` 通过 `/api/ws/chat` 恢复。
  - name: skills
    description: |
      管理用户安装的技能（skill）包。每个 skill 是
      `~/.campusclaw/packages/` 下的一个自包含目录，其中必须包含一个
      `SKILL.md` 文件（可选带 YAML frontmatter）。

      REST 层面暴露 **上传归档**、**列举**、**删除**、**启用**、**禁用**
      五个操作。基于 Git 的安装（`campusclaw skill install <url>`）和本地
      目录链接（`campusclaw skill link <path>`）仅在 CLI 中可用 —— 但通过
      这两种方式安装的 skill 仍会出现在 `GET /api/skills` 的返回中，并
      带上对应的 `sourceType`。

      **启用/禁用语义**：被禁用的 skill 不会进入新会话的 `SkillRegistry`，
      也不会出现在系统提示词或 `/skill` 触发逻辑中。状态全局持久，落盘到
      `~/.campusclaw/packages/.disabled.json`。**已存在的活跃会话不会受
      影响**，需要在该会话内执行 `/reload` 才会生效。注意：禁用清单不会
      因 `DELETE /api/skills/{name}` 而清理，删除后再以同名重装的 skill
      会沿用之前的禁用状态。
  - name: settings
    description: |
      读取与回写全局 `~/.campusclaw/agent/settings.json` 中的模型相关字段。
      所有写入端点都走 `SettingsManager.setGlobal`，仅修改全局文件；
      project 级 `.campusclaw/settings.json` 不受影响。

      **生效时机**：`SettingsManager.load()` 每次都重新读盘 + 合并，所以
      `defaultModel` 在写入后对**新的 WS 连接**立即生效；已经打开的连接
      保留原值。`customModels` 的新增/删除会触发
      `CustomModelLoader.refresh()`，即时刷新 `ModelRegistry` 中
      `provider==custom` 的条目——下一次 `list_models` 命令或新 WS 连接
      会读到最新目录。

paths:
  /api/health:
    get:
      tags: [health]
      summary: 健康检查
      operationId: getHealth
      description: |
        进程存活探针。永远返回 200 `{"status":"ok"}` —— 不检查模型 provider、
        数据库或文件系统等下游依赖。LB / k8s liveness probe 可以直接打这个
        端点。
      responses:
        "200":
          description: 服务进程在跑。
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    enum: [ok]
              example:
                status: ok

  /api/chat:
    post:
      tags: [chat]
      summary: 流式对话（SSE）
      operationId: streamChat
      description: |
        发起一次 agent turn，响应以 `text/event-stream` 推送。同一
        `conversation_id` 对应的 session 由 `SessionPool` 复用，所以多次
        请求会沿用对话历史。请求未带 `conversation_id` 时服务端会生成
        一个新的，并在每条事件的 JSON `data` 中携带回去。

        **客户端中断**：关闭 SSE 连接会被服务端识别为「中断当前 turn」——
        若该会话还在 streaming，服务端会自动调用 `session.abort()`。

        **每次请求级别的 override**：`model` / `thinking` 字段允许在不开
        一个完整 WS 会话的情况下，临时切换当次 turn 的模型或思考等级。
        校验失败（model id 不存在、thinking level 不合法）会立即返回
        400，不进入 SSE。

        **事件类型**（`event:` 字段）：
          - `message_start` — `{ conversation_id }`，assistant 消息开始
          - `message_update` — `{ message }`，包含到目前为止的完整
            assistant Message（增量请前端自行 diff）
          - `message_end` — `{ message }`，assistant 消息最终值
          - `tool_start` — `{ toolName, toolCallId }`
          - `tool_end` — `{ toolCallId }`（不携带具体 result，需要 result
            请改用 WebSocket 的 `tool_end` 事件）
          - `done` — `{ conversation_id }`，turn 完成，紧随其后 server
            会关闭 SSE 流
          - `error` — `{ error, conversation_id }`，`session.prompt(...)`
            完成异常时发出，随后 server 关闭 SSE 流

        SSE 端点的事件集合相对最小化；需要 `tool_update`、`agent_start`、
        `done` 中携带 `finalText`/`usage`/`stopReason` 等更丰富的字段时
        请改用 WebSocket（`/api/ws/chat`）。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
            examples:
              firstTurn:
                summary: 首次请求，不带 conversation_id
                value:
                  message: 用 Java 写一个快速排序
              followUp:
                summary: 继续既有会话
                value:
                  message: 改写成迭代版本
                  conversation_id: a1b2c3d4e5f6
              withOverrides:
                summary: 当次切模型 + 调高 thinking
                value:
                  message: 分析一下这段栈
                  conversation_id: a1b2c3d4e5f6
                  model: glm-5
                  thinking: high
      responses:
        "200":
          description: |
            SSE 流。响应 Content-Type 为 `text/event-stream`，每个事件
            形如 `event: <type>\ndata: <json>\n\n`。事件类型与 JSON 形态
            见上方描述。
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  按 SSE 协议编码的事件流。OpenAPI 无法以 schema 表达
                  事件序列，请参考端点描述里的事件类型表。
              example: |
                event: message_start
                data: {"conversation_id":"a1b2c3d4e5f6"}

                event: message_update
                data: {"message":{"role":"assistant","content":[{"type":"text","text":"快速排序"}]}}

                event: message_end
                data: {"message":{"role":"assistant","content":[{"type":"text","text":"..."}]}}

                event: done
                data: {"conversation_id":"a1b2c3d4e5f6"}
        "400":
          description: |
            请求体缺 `message`、`model` 不存在于 registry，或 `thinking`
            不是合法 ThinkingLevel。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                missing-message:
                  value:
                    error: message is required
                bad-model:
                  value:
                    error: "Invalid model: unknown model id: foobar"
                bad-thinking:
                  value:
                    error: "Invalid thinking level: super-high"
        "409":
          description: |
            同一 `conversation_id` 已经在 streaming 中。客户端必须先等待
            前一个 turn 完成（或调用 WebSocket 的 `abort` 命令）。
          content:
            application/json:
              schema:
                type: object
                required: [error, conversation_id]
                properties:
                  error: { type: string }
                  conversation_id: { type: string }
              example:
                error: This conversation is already processing a prompt
                conversation_id: a1b2c3d4e5f6
        "500":
          description: 服务端意外错误（一般是 JSON 解析 / 序列化失败）。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/conversations:
    get:
      tags: [conversations]
      summary: 列出已持久化的会话
      operationId: listConversations
      description: |
        扫描服务端的 JSONL 会话目录并返回所有可恢复的会话条目。每条会话
        会携带从 JSONL 解析出的：
          - `id` —— 文件名（去掉 `.jsonl`），即客户端用来 resume 的
            `conversation_id`
          - `title` —— 第一条 user 消息的首个 `text` 内容（最多 80 字符），
            没有 user 消息时回退为 `id`
          - `messageCount` —— `type:"message"` 条目数量
          - `createdAt` —— 会话 header 行的 ISO-8601 时间戳
          - `updatedAt` —— JSONL 文件的最后修改时间（ISO-8601）

        结果按 `updatedAt` 倒序排列。当持久化目录尚未创建（从未发过任何
        prompt）时返回空数组。
      responses:
        "200":
          description: 当前 cwd 下的全部会话条目。
          content:
            application/json:
              schema:
                type: object
                required: [conversations]
                properties:
                  conversations:
                    type: array
                    items: { $ref: "#/components/schemas/ConversationSummary" }
              examples:
                two-conversations:
                  value:
                    conversations:
                      - id: f345b3be8453
                        title: 用 Java 写一个快速排序
                        messageCount: 4
                        createdAt: "2026-05-04T10:23:14Z"
                        updatedAt: "2026-05-04T10:24:55Z"
                      - id: 0b0405bd448a
                        title: 0b0405bd448a
                        messageCount: 0
                        createdAt: "2026-05-03T22:11:00Z"
                        updatedAt: "2026-05-03T22:11:00Z"

  /api/conversations/{id}:
    delete:
      tags: [conversations]
      summary: 移除指定会话（仅内存层）
      operationId: removeConversation
      description: |
        从内存中的 `SessionPool` 移除指定 `conversation_id` 对应的活跃
        session（包含中断写者），但**不会**删除磁盘上的 JSONL 文件。也就是
        说移除后用户用同一 `conversation_id` 重连仍能从磁盘 resume。
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
          description: 会话 ID（即 JSONL 文件名）。
      responses:
        "200":
          description: 已从内存池中移除。
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
        "404":
          description: 没有匹配的活跃会话（也可能磁盘上仍存在 JSONL）。
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }

  /api/skills:
    post:
      tags: [skills]
      summary: 上传 skill 归档包
      operationId: uploadSkill
      description: |
        上传一个 `.zip`、`.tar.gz` 或 `.tgz` 归档，包内至少需包含一个
        `SKILL.md`。服务端处理流程如下：

        1. 根据**上传文件的原始 filename** 推导 skill 目录名 —— 去扩展名、
           转小写、将非 `[a-z0-9-]` 字符替换为 `-`、合并连续 `-`、去首尾
           `-`。结果为空则返回 **400**。
        2. 将归档解压到临时目录。对会逃逸出目标目录的 zip entry（zip-slip）
           直接拒绝。
        3. 若解压后恰好只有一个顶层子目录，则自动"拆壳" —— 该子目录的内容
           成为 skill 根目录。
        4. 校验至少存在一个 `SKILL.md`（根目录或一级子目录中），否则返回
           **400**。
        5. 将解压后的目录树移动到 `~/.campusclaw/packages/<派生名>`，并在
           `.installed.json` 清单中登记，`sourceType` 标记为 `archive`。

        **单个归档包可以包含多个 `SKILL.md`**（每个子目录一个）。响应中
        `skills` 数组会列出 loader 发现的全部 skill。

        **格式识别基于 filename 扩展名，而不是 MIME 类型。** 客户端需保证
        `filename` 拥有支持的扩展名 —— Content-Type 用
        `application/octet-stream` 也可以。
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: |
                    归档文件。原始 filename 必须以下列扩展名之一结尾：
                    `.zip`、`.tar.gz`、`.tgz`。
            encoding:
              file:
                contentType: application/zip, application/gzip, application/x-tar, application/octet-stream
      responses:
        "200":
          description: Skill 安装成功。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillUploadResult"
              examples:
                singleSkill:
                  summary: 归档内只有单个顶层 skill
                  value:
                    name: my-skill
                    skills:
                      - name: code-review
                        description: 自动代码审查工作流
                multipleSkills:
                  summary: 归档是一个含多个 SKILL.md 的 skill 包
                  value:
                    name: document-skills
                    skills:
                      - name: docx
                        description: 创建、读取、编辑 Word 文档
                      - name: pdf
                        description: 读取、合并、拆分 PDF
                      - name: xlsx
                        description: 电子表格处理
        "400":
          description: |
            客户端错误。`error` 字段指明具体校验失败原因：
            - `Missing 'file' field in multipart request`
            - `Unsupported format: <filename>. Supported: .zip, .tar.gz, .tgz`
            - `No SKILL.md found in archive: ...`
            - `Directory already exists: ...`（派生出的目录名已存在）
            - `Cannot derive a valid skill name from: <filename>`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                missingFile:
                  summary: 请求中缺少 file 字段
                  value:
                    error: Missing 'file' field in multipart request
                unsupportedFormat:
                  summary: 扩展名不支持
                  value:
                    error: "Unsupported format: my-skill.rar. Supported: .zip, .tar.gz, .tgz"
                noSkillMd:
                  summary: 归档内缺少 SKILL.md
                  value:
                    error: "No SKILL.md found in archive: /tmp/skill-upload-1234.tmp\nThe archive must contain at least one SKILL.md file."
                alreadyExists:
                  summary: 同名 skill 已存在
                  value:
                    error: "Directory already exists: /Users/me/.campusclaw/packages/my-skill\nUse 'campusclaw skill remove my-skill' first."
        "409":
          description: |
            归档内的某个 skill `name` 与已安装 skill 重名。**整包安装会回滚**
            （不写入 packages 目录、不修改清单），客户端需自行决定先卸载已有
            skill 还是重命名归档内的 skill。`conflicts` 数组列出全部冲突项。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillConflict"
              example:
                error: Skill name conflict
                conflicts:
                  - skill: code-review
                    existingPackage: my-skill
        "500":
          description: 服务端意外错误（如文件系统错误或解压失败）。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Internal error: tar extraction failed: ..."

    get:
      tags: [skills]
      summary: 列出已安装的 skill
      operationId: listSkills
      description: |
        返回 packages 目录下 loader 能发现的全部 skill，按 `name` 升序
        排序。`sourceType` / `source` 字段会与 `.installed.json` 清单
        交叉核对 —— 如果某 skill 在磁盘上存在但不在清单中，`sourceType`
        退化为 `local`；若顶层目录是一个符号链接，则退化为 `link`。
      responses:
        "200":
          description: skill 列表（可能为空数组）。
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SkillInfo"
              example:
                - name: code-review
                  sourceType: archive
                  source: /tmp/my-skill.zip
                  description: 自动代码审查工作流
                  enabled: true
                - name: deploy-helper
                  sourceType: git
                  source: https://github.com/user/deploy-helper
                  description: 部署辅助工具
                  enabled: false
                - name: local-proto
                  sourceType: link
                  source: /Users/me/work/my-skill-dev
                  description: 开发中的 skill
                  enabled: true
                - name: orphan
                  sourceType: local
                  source: /Users/me/.campusclaw/packages/orphan
                  description: 手动放进来、未登记到清单的 skill
                  enabled: true
        "500":
          description: 服务端意外错误。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/skills/{name}:
    delete:
      tags: [skills]
      summary: 删除已安装的 skill
      operationId: deleteSkill
      description: |
        删除对应的 skill 目录或符号链接，并同步从 `.installed.json` 清单中
        移除对应条目。

        **状态码特例**：当 skill 不存在时，服务端返回的是 **`400`** 而不是
        更符合 REST 约定的 `404`。这是当前刻意保留的行为 —— DELETE 端点上
        的 `SkillInstallException` 统一映射到 400（与之相对，`POST /api/skills`
        的命名冲突 `SkillConflictException` 单独映射到 409，
        `POST /api/skills/{name}/{enable|disable}` 的 not-found 映射到 404）。
      parameters:
        - name: name
          in: path
          required: true
          description: skill 目录名，必须与 `GET /api/skills` 返回的 `name` 完全一致。
          schema:
            type: string
            pattern: "^[a-z0-9-]+$"
            maxLength: 64
          example: my-skill
      responses:
        "200":
          description: 删除成功。
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message:
                    type: string
                    description: 人类可读的操作结果描述。
              example:
                message: "Removed skill: my-skill"
        "400":
          description: |
            skill 不存在，或 skill manager 拒绝执行删除。可能的情况：
            - `Skill not found: <name>` —— 对应目录/符号链接不存在。
            - `Failed to remove symlink: ...` —— 删除符号链接时文件系统出错。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Skill not found: my-skill\nUse 'campusclaw skill list' to see installed skills."
        "500":
          description: 递归删除时发生意外文件系统错误。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/skills/{name}/enable:
    post:
      tags: [skills]
      summary: 启用一个已安装的 skill
      operationId: enableSkill
      description: |
        把指定 skill 从 `~/.campusclaw/packages/.disabled.json` 中移除（如有），
        使其在新会话中重新出现在 `SkillRegistry`。

        **幂等**：对一个本就处于启用状态的 skill 再次调用同样返回 200。

        **注意**：路径参数是 **skill 名**（即 `GET /api/skills` 返回的 `name`，
        来自 `SKILL.md` frontmatter），**不是** `DELETE /api/skills/{name}` 中
        的包目录名。两者大多数情况下相同，但当一个包内含多个 SKILL.md 时不同。
      parameters:
        - $ref: "#/components/parameters/SkillNamePath"
      responses:
        "200":
          description: 启用成功（含已是启用状态的幂等场景）。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillToggleResult"
              example:
                name: code-review
                enabled: true
                hint: "Affects new sessions; run /reload in existing sessions."
        "404":
          description: 找不到指定 skill 名（磁盘上没有任何已加载 skill 与之对应）。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Skill not found: code-review"
        "500":
          description: 写入 `.disabled.json` 时发生意外文件系统错误。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/skills/{name}/disable:
    post:
      tags: [skills]
      summary: 禁用一个已安装的 skill
      operationId: disableSkill
      description: |
        把指定 skill 加入 `~/.campusclaw/packages/.disabled.json`。新会话加载
        skill 时会跳过该 skill —— 它不会进入 `SkillRegistry`、不会进入系统
        提示词、也不会被 `/skill` 触发。

        **幂等**：对一个本就处于禁用状态的 skill 再次调用同样返回 200。

        **作用范围**：仅影响 user-level skill（`~/.campusclaw/packages/`）。
        project-level skill（`<cwd>/.campusclaw/skills/`）不受此 API 影响。

        **不影响活跃会话**：已经初始化的 `AgentSession` 内的 `SkillRegistry`
        不会被修改，需要在该会话内执行 `/reload` 才会重新加载并应用禁用清单。
      parameters:
        - $ref: "#/components/parameters/SkillNamePath"
      responses:
        "200":
          description: 禁用成功（含已是禁用状态的幂等场景）。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillToggleResult"
              example:
                name: code-review
                enabled: false
                hint: "Affects new sessions; run /reload in existing sessions."
        "404":
          description: 找不到指定 skill 名。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Skill not found: code-review"
        "500":
          description: 写入 `.disabled.json` 时发生意外文件系统错误。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/settings/models:
    get:
      tags: [settings]
      summary: 读取模型相关 settings + 当前可见模型目录
      operationId: getSettingsModels
      description: |
        返回前端配置页所需的全部模型相关状态：
          - `defaultModel` —— 合并 `model` / `defaultModel` 后的当前默认模型 id（可能为 null）
          - `customModels` —— `settings.customModels` 数组的当前值
          - `availableModels` —— `ModelCatalogService.getAvailableModels()` 的输出
            （仅含有凭证的「可用」模型，可选再经 `enabledModels` 收窄；`provider==custom`
            条目始终包含且排在最前）
          - `filtered` —— `enabledModels` 白名单是否生效（true 表示 `availableModels` 在白名单
            维度上是子集）。无论该标志如何，默认列表都已按「有凭证」过滤
      responses:
        "200":
          description: 当前的模型 settings snapshot。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettingsModelsSnapshot"
        "500":
          description: 读盘或合并 settings 时发生意外错误。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/settings/models/default:
    put:
      tags: [settings]
      summary: 设置默认模型
      operationId: setSettingsDefaultModel
      description: |
        把 `defaultModel` 写入 `~/.campusclaw/agent/settings.json`。模型 id
        必须在当前 `ModelRegistry` 中存在（含内置 + customModels），否则返回
        400。**对已经打开的 WS 连接不生效**；新 WS 连接会读到新值。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DefaultModelRequest"
            example:
              model: glm-5
      responses:
        "200":
          description: 写入成功。
          content:
            application/json:
              schema:
                type: object
                required: [defaultModel]
                properties:
                  defaultModel:
                    type: string
                    description: 刚刚写入的模型 id。
              example:
                defaultModel: glm-5
        "400":
          description: 请求体缺字段、字段为空，或模型 id 不存在于 registry。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                missing-model:
                  value:
                    error: model is required
                unknown-model:
                  value:
                    error: "unknown model: nonexistent"
        "500":
          description: 写入 settings.json 时发生意外错误。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/settings/customModels:
    put:
      tags: [settings]
      summary: 全量替换自定义模型列表
      operationId: setSettingsCustomModels
      description: |
        把请求体作为 **完整** `customModels` 数组写入
        `~/.campusclaw/agent/settings.json`，覆盖原值（**不是 patch**）。写入
        成功后立即调用 `CustomModelLoader.refresh()`：先从 `ModelRegistry`
        中删掉所有 `provider==custom` 条目，再用新数组重新注册。下一个 WS
        连接 / 下一次 `list_models` 命令就能看到新目录。

        校验规则：
          - 数组每一项必须含非空 `id` 和 `api`
          - 数组内 `id` 不允许重复
          - 解析失败、空对象、缺字段、id 重复 → 400
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/CustomModelConfig"
            example:
              - id: local-foo
                name: Local Foo
                api: openai
                baseUrl: http://localhost:1234/v1
                apiKey: sk-x
                contextWindow: 128000
                maxTokens: 8192
      responses:
        "200":
          description: 写入并刷新成功。
          content:
            application/json:
              schema:
                type: object
                required: [customModels, count]
                properties:
                  customModels:
                    type: array
                    items:
                      $ref: "#/components/schemas/CustomModelConfig"
                  count:
                    type: integer
                    minimum: 0
                    description: 新数组的长度（等于 `customModels.length`，便于前端 sanity check）。
        "400":
          description: 请求体不是 JSON 数组，或某一项缺字段 / id 重复。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                not-array:
                  value:
                    error: customModels payload must be a JSON array
                missing-id:
                  value:
                    error: "customModels[0].id is required"
                missing-api:
                  value:
                    error: "customModels[1].api is required (id=local-foo)"
                duplicate-id:
                  value:
                    error: "duplicate customModels id: local-foo"
        "500":
          description: 写盘或 registry 刷新时发生意外错误。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  schemas:
    ChatRequest:
      type: object
      description: "`POST /api/chat` 的请求体。"
      required: [message]
      properties:
        message:
          type: string
          minLength: 1
          description: |
            用户输入文本。`null` 或全空白会被拒绝（400）。与 WebSocket `prompt`
            命令一致，SSE 也走 `AgentSession.prompt(...)`：前导 `/<name> args`
            先按 prompt template 展开，`/skill:name args` 再按 skill 命令展开，
            然后才交给 agent。
          example: 用 Java 写一个快速排序
        conversation_id:
          type: string
          nullable: true
          description: |
            目标会话 id。未提供时由服务端生成一个新 id 并在所有 SSE 事件的
            JSON `data` 中回传。
          example: a1b2c3d4e5f6
        model:
          type: string
          nullable: true
          description: |
            本次 turn 临时切换的模型 id。**会改写 session 上的模型** ——
            后续 turn 也会沿用，直到下次再传 `model` 或通过 WebSocket
            `set_model` 改回。id 不在 ModelRegistry 中时返回 400。
          example: glm-5
        thinking:
          type: string
          nullable: true
          enum: [off, minimal, low, medium, high, xhigh]
          description: |
            本次 turn 临时切换的思考等级。与 `model` 一样会写入 session，
            后续 turn 沿用直到再次修改。非法值返回 400。
          example: high

    ConversationSummary:
      type: object
      description: "`GET /api/conversations` 返回的单条会话条目。"
      required: [id, title, messageCount, createdAt, updatedAt]
      properties:
        id:
          type: string
          description: 会话 ID。前端把这个值传给 `/api/ws/chat?conversation_id=<id>` 即可恢复。
        title:
          type: string
          description: |
            第一条 user 消息的 text 内容（折叠空白，截断到 80 字符）。
            没有 user 消息时回退为 `id`，便于前端始终能渲染一条可点项。
        messageCount:
          type: integer
          minimum: 0
          description: JSONL 中 `type:"message"` 条目的数量。
        createdAt:
          type: string
          format: date-time
          description: 会话 header 行写入时的 ISO-8601 时间。
        updatedAt:
          type: string
          format: date-time
          description: JSONL 文件最后修改时间，按此字段倒序排列结果。

    SkillInfo:
      type: object
      description: "`GET /api/skills` 返回的单个已安装 skill 条目。"
      required: [name, sourceType, source, description, enabled]
      properties:
        name:
          type: string
          description: |
            skill 标识符，取自 `SKILL.md` frontmatter（或从目录名推导）。
            仅允许 `[a-z0-9-]`，最长 64 字符。
          pattern: "^[a-z0-9-]+$"
          maxLength: 64
          example: code-review
        sourceType:
          type: string
          description: |
            该 skill 的安装来源：
            - `git` —— 通过 `campusclaw skill install <url>` 克隆
            - `link` —— 通过 `campusclaw skill link <path>` 创建的符号链接
              （或磁盘上是 symlink 但清单里无记录的情况）
            - `archive` —— 通过 `POST /api/skills` 上传
            - `local` —— 磁盘上存在、清单中无记录且非符号链接的"裸"目录
          enum: [git, link, archive, local]
          example: archive
        source:
          type: string
          description: |
            来源标识，含义取决于 `sourceType`：
            - `git` —— 克隆 URL
            - `link` —— 符号链接指向的绝对路径
            - `archive` —— 安装时的归档文件路径（当前可能已不存在）
            - `local` —— skill 在磁盘上的目录路径
          example: /tmp/my-skill.zip
        description:
          type: string
          description: |
            skill 的人类可读描述，来自 `SKILL.md` frontmatter。
            最长 1024 字符。
          maxLength: 1024
          example: 自动代码审查工作流
        enabled:
          type: boolean
          description: |
            是否参与新会话的 skill 加载。`false` 表示该 skill 名出现在
            `~/.campusclaw/packages/.disabled.json` 中。新装的 skill 默认
            为 `true`。仅 user-level skill 受 `.disabled.json` 影响。
          example: true

    SkillUploadResult:
      type: object
      description: "`POST /api/skills` 成功时的响应体。"
      required: [name, skills]
      properties:
        name:
          type: string
          description: |
            归档安装后的目录名，根据上传 filename 派生（小写、仅
            `[a-z0-9-]`）。
          pattern: "^[a-z0-9-]+$"
          maxLength: 64
          example: my-skill
        skills:
          type: array
          description: |
            loader 在该归档中发现的所有 skill。通常只有一个；若归档是
            一个包含多个 `SKILL.md`（每个子目录一个）的 skill 包，则
            会有多个条目。
          items:
            type: object
            required: [name, description]
            properties:
              name:
                type: string
                description: skill 标识符。
                pattern: "^[a-z0-9-]+$"
                maxLength: 64
              description:
                type: string
                description: skill 的人类可读描述。
                maxLength: 1024

    SkillToggleResult:
      type: object
      description: "`POST /api/skills/{name}/{enable|disable}` 成功时的响应体。"
      required: [name, enabled, hint]
      properties:
        name:
          type: string
          description: 被启用/禁用的 skill 名（即请求路径中的 `name`）。
          pattern: "^[a-z0-9-]+$"
          maxLength: 64
          example: code-review
        enabled:
          type: boolean
          description: 操作完成后该 skill 的状态。enable 接口固定为 `true`，disable 固定为 `false`。
          example: true
        hint:
          type: string
          description: |
            人类可读提示，固定为
            `Affects new sessions; run /reload in existing sessions.`，提醒
            调用方此操作不会改动已存在 `AgentSession` 的 `SkillRegistry`。
          example: "Affects new sessions; run /reload in existing sessions."

    SkillConflict:
      type: object
      description: |
        `POST /api/skills` 的 409 响应体。归档内出现一个或多个与已安装
        skill 重名的项时返回；服务端不会写入 packages 目录、不会修改
        清单（整包回滚）。
      required: [error, conflicts]
      properties:
        error:
          type: string
          description: 固定为 `Skill name conflict`。
          example: Skill name conflict
        conflicts:
          type: array
          description: 全部冲突项的列表。
          items:
            type: object
            required: [skill, existingPackage]
            properties:
              skill:
                type: string
                description: 归档内冲突的 skill 名。
                pattern: "^[a-z0-9-]+$"
                maxLength: 64
                example: code-review
              existingPackage:
                type: string
                description: |
                  已存在该 skill 名的包目录（即 `~/.campusclaw/packages/`
                  下的顶层目录名）。
                pattern: "^[a-z0-9-]+$"
                maxLength: 64
                example: my-skill

    CustomModelConfig:
      type: object
      description: |
        `settings.customModels` 数组的一项。映射到 Java record
        `Settings.CustomModelConfig`。`id` + `api` 必填，其余可选；缺省时由
        `CustomModelLoader.toModel` 填默认值（contextWindow=128000、
        maxTokens=8192、modalities=[TEXT]、reasoning=false）。
      required: [id, api, baseUrl, apiKey]
      properties:
        id:
          type: string
          description: 模型 id（在 registry 中作为查找键，必须全局唯一）。
          example: local-foo
        name:
          type: string
          nullable: true
          description: 人类可读名称（UI 展示用），未给则回退为 `id`。
          example: Local Foo
        api:
          type: string
          description: |
            协议类型，对应 `Api` 枚举的字符串值（如 `openai`、
            `openai-completions`、`anthropic`）。无效值在写盘成功后被
            `CustomModelLoader.refresh()` 跳过（warn 日志）。
          example: openai
        baseUrl:
          type: string
          description: 提供方的 base URL。支持 `${ENV}` / `${ENV:-default}` 表达式。
          example: http://localhost:1234/v1
        apiKey:
          type: string
          description: API key。支持 `${ENV}` / `${ENV:-default}` 表达式。
          example: ${LOCAL_API_KEY:-sk-local}
        contextWindow:
          type: integer
          minimum: 1
          nullable: true
          description: 上下文窗口大小（tokens）。缺省 128000。
        maxTokens:
          type: integer
          minimum: 1
          nullable: true
          description: 最大输出 tokens。缺省 8192。
        reasoning:
          type: boolean
          nullable: true
          description: 是否启用 reasoning（thinking）。缺省 false。
        inputModalities:
          type: array
          nullable: true
          items:
            type: string
            enum: [TEXT, IMAGE]
          description: 支持的输入模态。缺省 `[TEXT]`，未知值会被忽略。
        thinkingFormat:
          type: string
          nullable: true
          description: |
            Reasoning 内容的传输格式（`zai`、`anthropic` 等）。
            按 provider 自定义；空则使用 provider 默认。

    DefaultModelRequest:
      type: object
      description: "`PUT /api/settings/models/default` 的请求体。"
      required: [model]
      properties:
        model:
          type: string
          description: 要写入 `settings.defaultModel` 的模型 id。必须存在于 `ModelRegistry`。
          example: glm-5

    SettingsModelsSnapshot:
      type: object
      description: "`GET /api/settings/models` 的响应体。"
      required: [customModels, availableModels, filtered]
      properties:
        defaultModel:
          type: string
          nullable: true
          description: |
            当前生效的默认模型 id。优先采用 opencode 风格的 `model` 字段，
            退回 `defaultModel`。两个字段都未设置时为 null。
          example: glm-5
        customModels:
          type: array
          description: settings.json 中当前的 customModels 数组（可能为空）。
          items:
            $ref: "#/components/schemas/CustomModelConfig"
        availableModels:
          type: array
          description: |
            UI 模型选择器应当展示的条目。等同于
            `ModelCatalogService.getAvailableModels()` + 同样的 wire 格式，
            与 WS `list_models`（默认 `all:false`）返回的 `models` 字段一致：
            仅含有凭证的可用模型，custom 置顶；要全量需走 WS `list_models all:true`。
          items:
            type: object
            required: [id, name, provider, contextWindow, maxTokens, reasoning, hasCredentials]
            properties:
              id: { type: string }
              name: { type: string }
              provider: { type: string }
              contextWindow: { type: integer }
              maxTokens: { type: integer }
              reasoning: { type: boolean }
              hasCredentials:
                type: boolean
                description: 服务端能否为该模型解析出 API key。默认列表里恒为 true（无凭证模型已被过滤）；custom 恒 true。
              cost:
                type: object
                description: 价格表（USD per 1M tokens）。所有内置/自定义模型都会含此结构（自定义默认全 0）。
                properties:
                  input: { type: number }
                  output: { type: number }
                  cacheRead: { type: number }
                  cacheWrite: { type: number }
        filtered:
          type: boolean
          description: |
            `enabledModels` 白名单是否生效。true 表示在白名单维度上 `availableModels`
            是子集。注意：与该标志无关，`availableModels` 始终已按「有凭证」过滤——
            该标志只反映白名单，不反映凭证过滤。

    Error:
      type: object
      description: |
        所有 skill 端点的非 2xx 响应共用的错误包装。`error` 字段为人类
        可读消息，可能包含换行符。`POST /api/skills` 的 409 响应使用更
        具体的 `SkillConflict` schema，但仍包含相同的 `error` 字段。
      required: [error]
      properties:
        error:
          type: string
          description: 错误描述文本。
          example: "Missing 'file' field in multipart request"

  parameters:
    SkillNamePath:
      name: name
      in: path
      required: true
      description: |
        启用/禁用接口下的 skill 名（即 `GET /api/skills` 返回的 `name`）。
      schema:
        type: string
        pattern: "^[a-z0-9-]+$"
        maxLength: 64
      example: code-review

spring:
  main:
    banner-mode: off
    lazy-initialization: true
    web-application-type: none
  lazy-initialization:
    exclude: webSocketGatewayConfig,gatewayChannel
  application:
    name: campusclaw-agent
  datasource:
    url: ${GAUSSDB_URL:jdbc:postgresql://localhost:5433/pi_assistant}
    username: ${GAUSSDB_USER:postgres}
    password: ${GAUSSDB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: never

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.campusclaw.assistant.mapper
  configuration:
    map-underscore-to-camel-case: true

pi:
  assistant:
    gateway:
      enabled: true
      token:

logging:
  level:
    root: WARN
    com.campusclaw: WARN
    io.netty: ERROR

# 工具执行配置 - 沙箱模式
tool:
  execution:
    # 默认执行模式: LOCAL | SANDBOX | AUTO
    # SANDBOX = 强制所有工具在沙箱中执行
    # AUTO = 根据风险评估自动选择
    # LOCAL = 强制本地执行
    default-mode: SANDBOX

    # 启用混合路由
    # 注意：启用混合工具会替换原工具，但两者不能同时存在
    # 当前设置为 true，使用混合工具执行（支持沙箱模式）
    hybrid-enabled: true

    # 允许本地执行
    local-execution-enabled: true

    # 允许沙箱执行（需要 Docker）
    sandbox-execution-enabled: true

    # Docker 守护进程地址（本地开发使用本地 Docker）
    docker-host: unix:///var/run/docker.sock

    # 沙箱工作目录
    sandbox-workspace-path: /workspace

    # 沙箱工作镜像
    sandbox-worker-image: alpine:3.19

    # 沙箱资源限制
    sandbox-worker-memory: 512m
    sandbox-worker-cpu: 1.0

    # 超时配置
    sandbox-timeout-seconds: 120
    local-timeout-seconds: 60

    # 使用临时容器模式（不需要常驻 worker 容器）
    # 适用于无法拉取镜像的场景，每次执行创建新容器
    use-ephemeral-containers: false
